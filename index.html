<!DOCTYPE html>
<html>
<head>
<title>AmenAI Thunder</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  overflow:hidden;
}

/* Thunder background */
#thunder-bg{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
  background:linear-gradient(#0a0a0a, #111);
  overflow:hidden;
}

.lightning{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  animation:flash 6s infinite;
}

@keyframes flash{
  0%{opacity:0;}
  1%{opacity:0.8;}
  2%{opacity:0;}
  10%{opacity:0;}
  11%{opacity:0.6;}
  12%{opacity:0;}
  100%{opacity:0;}
}

/* Header */
header{
  background:#020617;
  padding:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

/* Chat board */
#chat{
  height:75vh;
  overflow:auto;
  padding:15px;
  position:relative;
}

.user{
  text-align:right;
  margin:10px;
  color:#38bdf8;
}

.bot{
  text-align:left;
  margin:10px;
  color:#22c55e;
}

/* Input area */
#bottom{
  display:flex;
  position:fixed;
  bottom:0;
  width:100%;
}

input{
  flex:1;
  padding:15px;
  font-size:16px;
  border:none;
}

button{
  padding:15px;
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover{
  background:#1d4ed8;
}
</style>
</head>
<body>

<div id="thunder-bg">
  <div class="lightning"></div>
</div>

<header>⚡ AmenAI Thunder</header>

<div id="chat"></div>

<div id="bottom">
  <input id="input" placeholder="Ask AmenAI anything...">
  <button onclick="send()">Send</button>
</div>

<script>
let messages=[];

async function send(){
  let input=document.getElementById("input");
  let text=input.value;
  if(!text) return;

  messages.push({role:"user", content:text});
  document.getElementById("chat").innerHTML+=`<div class="user">${text}</div>`;
  input.value="";
  
  document.getElementById("chat").innerHTML+=`<div class="bot">⚡ AmenAI is thinking...</div>`;

  const response = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer YOUR_API_KEY"
    },
    body: JSON.stringify({
      model:"gpt-4o-mini",
      messages:messages
    })
  });

  const data = await response.json();
  const reply = data.choices[0].message.content;

  messages.push({role:"assistant", content:reply});
  document.querySelector(".bot:last-child").innerHTML = reply;
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}
</script>

</body>
</html>
